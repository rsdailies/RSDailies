# Glossary Schema
# Validates glossary.md entries.

type: object
required: [terms]
properties:
  terms:
    type: array
    items:
      type: object
      required: [term, definition, part]
      properties:
        term: { type: string }
        definition: { type: string }
        part: { type: string, enum: ["BRAIN", "HEART", "EYES", "EARS", "NOSE", "MOUTH", "HANDS", "LEGS", "NERVES", "ORGANS", "IMMUNE", "SKELETON"] }
