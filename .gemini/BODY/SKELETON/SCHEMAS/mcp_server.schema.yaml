# MCP Server Schema
# Validates files in BODY/NERVES/MCP/

type: object
required:
  - id
  - name
  - transport
properties:
  id:
    type: string
  name:
    type: string
  transport:
    type: string
    enum: ["stdio", "http", "sse"]
  command:
    type: string
  args:
    type: array
    items: { type: string }
  endpoint:
    type: string
  status:
    type: string
    enum: ["active", "planned", "deprecated"]
