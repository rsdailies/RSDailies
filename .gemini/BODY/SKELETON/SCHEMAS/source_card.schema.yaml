# Source Card Schema
# Validates files in BODY/EYES/SOURCES/source_cards/

type: object
required:
  - id
  - url
  - title
  - last_verified
properties:
  id:
    type: string
  url:
    type: string
    format: uri
  title:
    type: string
  publisher:
    type: string
  authority:
    type: string
    enum: ["official", "vendor", "community", "project_docs"]
  last_verified:
    type: string
    format: date
  volatility:
    type: string
    enum: ["low", "medium", "high"]
  claims:
    type: array
    items: { type: string }
