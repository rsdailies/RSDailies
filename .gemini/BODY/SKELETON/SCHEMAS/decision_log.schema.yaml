# Schema: Governance Decision Log
type: object
required: [id, timestamp, context, decision, rationale, impact_organs]
properties:
  id:
    type: string
    description: "UUID or unique slug for the decision"
  timestamp:
    type: string
    format: date-time
  context:
    type: string
    description: "The situation requiring a decision"
  decision:
    type: string
    description: "The action chosen"
  rationale:
    type: string
    description: "Why this action was chosen over alternatives"
  alternatives_considered:
    type: array
    items: { type: string }
  impact_organs:
    type: array
    items: 
      enum: [BRAIN, EYES, EARS, NOSE, MOUTH, HANDS, HEART, NERVES, ORGANS, IMMUNE, SKELETON, LEGS]
  approval_signal:
    type: string
    description: "The user's authorization token/text"
