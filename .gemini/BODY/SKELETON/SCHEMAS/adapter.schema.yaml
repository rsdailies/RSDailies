# Adapter Schema
# Validates files in BODY/MOUTH/ADAPTERS/

type: object
required:
  - id
  - source
  - target
  - mode
properties:
  id:
    type: string
  source:
    type: string
    description: "Canonical path in BODY."
  target:
    type: string
    description: "Export path in host surface."
  mode:
    type: string
    enum: ["generated_pointer", "wrapper", "symlink"]
  last_mirrored:
    type: string
    format: date-time
