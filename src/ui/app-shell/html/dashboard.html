<div id="overview-content" class="mb-4"></div>

<div class="col-12 table_container" id="custom-container" data-hide="show" data-show-hidden="false">
    <table id="custom-table" class="table table-dark table-hover activity_table custom-task-table">
        <colgroup>
            <col class="activity_col_name">
            <col class="activity_col_timer">
            <col class="activity_col_notes">
            <col class="activity_col_status">
        </colgroup>
        <thead>
            <tr>
                <td colspan="4" class="header_like_color">
                    <div class="header_like_inner"
                        style="position:relative; display:flex; align-items:center; justify-content:center; width:100%; min-height:42px;">
                        <div class="activity_name header_like_name" style="width:100%; text-align:center;">
                            <span class="header_like_text">Custom Tasks</span>
                        </div>
                        <div
                            style="position:absolute; right:0; top:50%; transform:translateY(-50%); display:inline-flex; align-items:center; gap:8px;">
                            <button id="custom_add_button" type="button" class="btn btn-primary btn-sm active">+
                                Add</button>
                            <button id="custom_hide_button" type="button"
                                class="btn btn-secondary btn-sm active hide_button">▼ Hide</button>
                            <button id="custom_unhide_button" type="button"
                                class="btn btn-secondary btn-sm active unhide_button">▶ Show</button>
                        </div>
                    </div>
                </td>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
