<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RSDailies - RS3 Dailies, Weeklies, Monthlies Task Checklist for RuneScape</title>
    <link rel="icon" type="image/png" href="/RSDailies/img/dailyscape.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

    <meta name="description"
        content="Self-hosted RS3 task tracker. Custom tasks, farming, dailies, gathering, weeklies, and monthlies with profiles and reset timers.">

    <!-- Core Theme -->
    <link rel="stylesheet" href="../../../theme/tokens/tokens.css">
    <link rel="stylesheet" href="../../../theme/base/base.css">
    <link rel="stylesheet" href="../../../theme/base/states.css">
    
    <!-- UI Primitives -->
    <link rel="stylesheet" href="../../../theme/components/modal.css">
    <link rel="stylesheet" href="../../../theme/components/button.css">
    <link rel="stylesheet" href="../../../theme/components/header.css">
    
    <!-- Shell Structure -->
    <link rel="stylesheet" href="../../../theme/shell/index.css">
    <link rel="stylesheet" href="../../../theme/shell/layout.css">
    <link rel="stylesheet" href="../../../theme/shell/controls.css">
    
    <!-- Component Specifics -->
    <link rel="stylesheet" href="../../../theme/tracker/row.css">
    <link rel="stylesheet" href="../../../theme/tracker/column.css">
    <link rel="stylesheet" href="../../../theme/tracker/table.css">
    <link rel="stylesheet" href="../../../theme/tracker/farming.css">
    <link rel="stylesheet" href="../../../theme/pages/overview.css">
    
    <!-- Responsive Overrides (Must load last) -->
    <link rel="stylesheet" href="../../../theme/shell/responsive.css">
</head>

<body id="app">
    <nav id="main-nav" class="navbar nav-pills fixed-top navbar-expand-lg navbar-dark bg-dark"></nav>

    <div id="landing-mount"></div>
    <div class="container-xl" id="overview-mount"></div>

    <div class="container-xl activity_tables" id="dashboard-container">
        <div class="row" id="dashboard-mount"></div>
    </div>

    <footer id="main-footer"></footer>

    <div id="modals-mount">
        <div id="token-modal" class="modal fade" tabindex="-1"></div>
        <div id="custom-task-modal" class="modal fade" tabindex="-1"></div>
    </div>

    <template id="sample_row"></template>

    <div id="tooltip" style="display:none; visibility:hidden;"></div>

    <script type="module">
        import { loadLayout } from '../runtime/layout-loader.js';
        import { bootstrapApp } from '../../boot/bootstrap.js';

        async function bootstrap() {
            await loadLayout();
            bootstrapApp();
        }

        bootstrap();
    </script>
</body>

</html>
