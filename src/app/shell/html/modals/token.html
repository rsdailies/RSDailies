<div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Import / Export Token</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <form>
                <div class="form-group">
                    <label for="token-output">This is your token. Copy it, and then import it on another computer.</label>
                    <div class="row pb-3">
                        <div class="col-sm-8">
                            <input id="token-output" class="form-control" type="text" value="" readonly>
                        </div>
                        <div class="col-sm-2">
                            <span class="d-inline-block" tabindex="0">
                                <button id="token-copy" type="button" class="btn btn-primary">Copy</button>
                            </span>
                        </div>
                    </div>
                    <div class="row">
                        <label for="token-input">Import your token below. This operation will overwrite your current profile data.</label>
                        <div class="col-sm-12">
                            <input class="form-control" type="text" id="token-input"
                                aria-describedby="validation-token-input" required>
                            <div id="validation-token-input" class="invalid-feedback">
                                That doesn't look right. Check your token and try again.
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button id="token-import" type="button" class="btn btn-primary">Import</button>
        </div>
    </div>
</div>
